<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doxus | Gestión Cloud de Pendientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const manualConfig = {
            apiKey: "AIzaSyB5yY0I1yCDkVCd1LLwAX3StRejmrmNllY",
            authDomain: "doxus-dashboard.firebaseapp.com",
            projectId: "doxus-dashboard",
            storageBucket: "doxus-dashboard.firebasestorage.app",
            messagingSenderId: "227145089102",
            appId: "1:227145089102:web:1a2a361b861eb30abb431f"
        };

        let firebaseConfig;
        try {
            firebaseConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) ? JSON.parse(__firebase_config) : manualConfig;
        } catch (e) {
            firebaseConfig = manualConfig;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'doxus-cloud-tasks';

        window.doxusDB = { 
            db, auth, appId, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot,
            signInWithCustomToken, signInAnonymously, onAuthStateChanged 
        };
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        doxus: { blue: '#262a36', yellow: '#Ffbc06', gray: '#f8f9fa', border: '#e9ecef', text: '#1f2937', light: '#64748b' }
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-print-color-adjust: exact; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; }
        .logo-box { background-color: #262a36; padding: 12px 24px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; }
        .logo-img { height: 40px; width: auto; object-fit: contain; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body class="bg-white text-doxus-text">

    <!-- Pantalla de Seguridad -->
    <div id="lock-screen" class="fixed inset-0 bg-doxus-blue z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="logo-box mb-8 scale-125 shadow-2xl">
            <img src="logo.png" alt="Doxus" class="logo-img" onerror="this.parentElement.innerHTML='<span class=\'text-doxus-yellow font-black\'>DOXUS</span>'">
        </div>
        <div class="text-center w-full max-w-xs px-4">
            <input type="password" id="pass-input" placeholder="PALABRA CLAVE" class="w-full bg-white/10 border border-white/20 rounded-xl py-4 text-center text-white placeholder-white/30 outline-none focus:border-doxus-yellow transition-all mb-4">
            <button id="login-btn" onclick="checkPass()" class="w-full bg-doxus-yellow text-doxus-blue font-black py-4 rounded-xl uppercase tracking-widest text-xs active:scale-95 transition-all shadow-lg shadow-yellow-500/20">Acceder al Sistema</button>
            <p id="pass-error" class="text-rose-400 text-[10px] mt-4 hidden font-bold uppercase tracking-widest">Contraseña Incorrecta</p>
        </div>
    </div>

    <!-- Layout Principal -->
    <div id="main-content" class="min-h-screen flex flex-col lg:flex-row opacity-0 transition-opacity duration-500">
        <aside class="no-print w-full lg:w-72 bg-doxus-blue text-white flex-shrink-0 flex flex-col sticky top-0 h-screen border-r-4 border-doxus-yellow">
            <div class="p-8 flex flex-col items-center border-b border-white/10">
                <div class="logo-box p-2 mb-4"><img src="logo.png" style="height: 25px;"></div>
                <h2 class="font-black text-sm tracking-widest uppercase">Intelligence Cloud</h2>
            </div>
            <nav class="flex-1 p-6 space-y-2">
                <button onclick="switchView('dashboard')" class="nav-item w-full flex items-center gap-4 p-3 rounded-xl bg-white/10 text-doxus-yellow font-bold text-sm transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="switchView('tasks')" class="nav-item w-full flex items-center gap-4 p-3 rounded-xl text-white/60 font-bold text-sm hover:bg-white/5 transition-all">
                    <i data-lucide="list-todo" class="w-5 h-5"></i> Pendientes
                </button>
            </nav>
            <div class="p-6 border-t border-white/10 text-center">
                <p class="text-[9px] text-white/30 font-black uppercase tracking-widest">Maximiliano Aréchiga-Morales</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-doxus-gray overflow-y-auto">
            <header class="bg-white border-b border-doxus-border px-8 py-4 flex justify-between items-center no-print sticky top-0 z-40">
                <h1 id="view-title" class="text-xl font-black text-doxus-blue uppercase">Panel de Control</h1>
                <div class="flex gap-3">
                    <button onclick="window.print()" class="bg-doxus-gray border border-doxus-border text-doxus-blue px-6 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest">🖨️ PDF</button>
                    <button onclick="openModal()" class="bg-doxus-blue text-white px-6 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest">➕ Manual</button>
                </div>
            </header>

            <div id="content-area" class="p-8">
                <div id="view-dashboard" class="space-y-8 animate-in fade-in duration-500">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-2xl border border-doxus-border shadow-sm text-center">
                            <span class="text-[9px] text-doxus-light uppercase tracking-widest font-black">Totales</span>
                            <div id="stat-total" class="text-4xl text-doxus-blue font-black mt-1">0</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-doxus-border shadow-sm text-center border-l-4 border-l-rose-500">
                            <span class="text-[9px] text-doxus-light uppercase tracking-widest font-black">Prioridad Alta</span>
                            <div id="stat-high" class="text-4xl text-rose-600 font-black mt-1">0</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-doxus-border shadow-sm text-center">
                            <span class="text-[9px] text-doxus-light uppercase tracking-widest font-black">En Trámite</span>
                            <div id="stat-process" class="text-4xl text-amber-600 font-black mt-1">0</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-doxus-border shadow-sm text-center">
                            <span class="text-[9px] text-doxus-light uppercase tracking-widest font-black">Sincronización</span>
                            <div class="text-xs text-emerald-500 mt-4 flex items-center justify-center font-bold">☁️ ONLINE</div>
                        </div>
                    </div>

                    <div class="bg-white rounded-3xl border border-doxus-border shadow-sm overflow-hidden">
                        <div class="p-6 border-b border-doxus-border flex justify-between items-center bg-doxus-gray/30">
                            <h3 class="font-black text-doxus-blue uppercase text-xs tracking-widest">Listado Maestro DX-26</h3>
                            <input type="text" id="search-input" oninput="renderTasks()" placeholder="Buscar folio..." class="bg-white border border-doxus-border rounded-xl px-4 py-2 text-xs outline-none w-64 font-bold">
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-doxus-gray/50 text-[10px] text-doxus-light uppercase font-black tracking-widest border-b border-doxus-border">
                                    <tr>
                                        <th class="px-6 py-4">Folio</th>
                                        <th class="px-6 py-4">Expediente / Acción Sugerida</th>
                                        <th class="px-6 py-4">Categoría</th>
                                        <th class="px-6 py-4">Prioridad</th>
                                        <th class="px-6 py-4">Estatus Actual</th>
                                        <th class="px-6 py-4 text-right">Acción</th>
                                    </tr>
                                </thead>
                                <tbody id="task-list-body" class="divide-y divide-doxus-border"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Registro Manual -->
    <div id="task-modal" class="fixed inset-0 bg-doxus-blue/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-[2rem] overflow-hidden shadow-2xl animate-in zoom-in-95 duration-200">
            <div class="bg-doxus-blue p-6 text-white border-b-4 border-doxus-yellow">
                <h3 class="font-black text-lg uppercase">Nuevo Registro Manual</h3>
            </div>
            <form id="task-form" onsubmit="saveTask(event)" class="p-8 space-y-4">
                <input type="text" id="task-title" placeholder="Título del archivo" required class="w-full bg-doxus-gray border border-doxus-border rounded-xl px-4 py-4 outline-none font-bold text-sm">
                <textarea id="task-summary" placeholder="Tarea a desarrollar..." required class="w-full bg-doxus-gray border border-doxus-border rounded-xl px-4 py-4 outline-none text-sm h-24"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <select id="task-category" class="w-full bg-doxus-gray border border-doxus-border rounded-xl px-4 py-3 text-[10px] font-black uppercase outline-none"><option>Contrato</option><option>Revisión de Fianzas</option><option>Validar</option></select>
                    <select id="task-priority" class="w-full bg-doxus-gray border border-doxus-border rounded-xl px-4 py-3 text-[10px] font-black uppercase outline-none"><option>Alta</option><option>Media</option><option>Baja</option></select>
                </div>
                <button type="submit" class="w-full bg-doxus-yellow text-doxus-blue font-black py-4 rounded-xl uppercase tracking-widest text-xs active:scale-95 transition-all">Sincronizar Folio</button>
            </form>
        </div>
    </div>

    <script>
        let tasks = [];

        function switchView(viewId) {
            ['dashboard', 'tasks'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(`view-${viewId}`);
            if(target) target.classList.remove('hidden');
        }

        async function checkPass() {
            const passInput = document.getElementById('pass-input');
            const loginBtn = document.getElementById('login-btn');
            if(passInput.value === 'Doxus') {
                loginBtn.innerText = "AUTENTICANDO...";
                loginBtn.disabled = true;
                const dbCtx = window.doxusDB;
                try {
                    const { auth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = dbCtx;
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            document.getElementById('lock-screen').style.opacity = '0';
                            setTimeout(() => {
                                document.getElementById('lock-screen').style.display = 'none';
                                document.getElementById('main-content').classList.replace('opacity-0', 'opacity-100');
                                initFirestore();
                            }, 500);
                        }
                    });
                } catch (e) {
                    console.error(e);
                    loginBtn.innerText = "ERROR - REINTENTAR";
                    loginBtn.disabled = false;
                }
            } else {
                document.getElementById('pass-error').classList.remove('hidden');
            }
        }

        function initFirestore() {
            const { db, appId, collection, onSnapshot, auth } = window.doxusDB;
            if (!auth.currentUser) return;
            const collRef = collection(db, 'artifacts', appId, 'public', 'data', 'pendientes');
            onSnapshot(collRef, (snapshot) => {
                tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTasks();
            }, (error) => console.error("Firestore Error:", error));
        }

        async function saveTask(e) {
            e.preventDefault();
            const { db, appId, collection, addDoc, auth } = window.doxusDB;
            if (!auth.currentUser) return;
            const folio = "DX-26-" + Math.floor(1000 + Math.random() * 9000);
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pendientes'), {
                folio: folio,
                title: document.getElementById('task-title').value,
                summary: document.getElementById('task-summary').value,
                category: document.getElementById('task-category').value,
                priority: document.getElementById('task-priority').value,
                status: "Sin Atender",
                created: new Date().toISOString()
            });
            closeModal();
            e.target.reset();
        }

        async function updateStatus(id, newStatus) {
            const { db, appId, doc, updateDoc, auth } = window.doxusDB;
            if (!auth.currentUser) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pendientes', id), { status: newStatus });
        }

        async function deleteTask(id) {
            const { db, appId, doc, deleteDoc, auth } = window.doxusDB;
            if (!auth.currentUser) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pendientes', id));
        }

        function renderTasks() {
            const body = document.getElementById('task-list-body');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = tasks.filter(t => t.folio?.toLowerCase().includes(search) || t.title?.toLowerCase().includes(search));

            body.innerHTML = filtered.map(t => {
                const searchLink = `https://mail.google.com/mail/u/0/#search/${encodeURIComponent(t.title?.replace('[📁]', '').trim())}`;
                return `
                    <tr class="group hover:bg-doxus-gray transition-colors">
                        <td class="px-6 py-5 font-black text-[10px] text-doxus-light tracking-tighter uppercase">${t.folio || 'DX-26-XXXX'}</td>
                        <td class="px-6 py-5">
                            <div class="text-sm font-black text-doxus-blue uppercase tracking-tighter">${t.title}</div>
                            <div class="text-[10px] text-doxus-light font-bold mt-0.5 leading-tight italic line-clamp-1">"${t.summary || 'Pendiente de auditar'}"</div>
                        </td>
                        <td class="px-6 py-5">
                            <span class="text-[9px] font-black uppercase px-2 py-1 rounded-md bg-slate-100 tracking-wider font-black">${t.category}</span>
                        </td>
                        <td class="px-6 py-5">
                            <span class="text-[9px] font-black px-3 py-1 rounded-full ${t.priority === 'Alta' ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-doxus-light'} uppercase font-black">${t.priority}</span>
                        </td>
                        <td class="px-6 py-5">
                            <select onchange="updateStatus('${t.id}', this.value)" class="text-[9px] font-black uppercase bg-transparent outline-none cursor-pointer border-b border-dotted border-doxus-light pb-1 hover:border-doxus-yellow transition-colors font-black">
                                <option value="Sin Atender" ${t.status === 'Sin Atender' ? 'selected' : ''}>Sin Atender</option>
                                <option value="Pendiente" ${t.status === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                                <option value="En Trámite" ${t.status === 'En Trámite' ? 'selected' : ''}>En Trámite</option>
                                <option value="Completado" ${t.status === 'Completado' ? 'selected' : ''}>Completado</option>
                            </select>
                        </td>
                        <td class="px-6 py-5 text-right flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                            <a href="${searchLink}" target="_blank" class="text-doxus-light hover:text-doxus-blue text-xs"><i data-lucide="mail" class="w-4 h-4"></i></a>
                            <button onclick="deleteTask('${t.id}')" class="text-rose-400 hover:text-rose-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('stat-total').innerText = tasks.length;
            document.getElementById('stat-high').innerText = tasks.filter(t => t.priority === 'Alta' && t.status !== 'Completado').length;
            document.getElementById('stat-process').innerText = tasks.filter(t => t.status === 'En Trámite').length;
            lucide.createIcons();
        }

        function openModal() { document.getElementById('task-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('task-modal').classList.add('hidden'); }
        window.onload = () => { 
            lucide.createIcons();
            document.getElementById('pass-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPass(); }); 
        };
    </script>
</body>
</html>
